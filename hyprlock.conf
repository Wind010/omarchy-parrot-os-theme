# ParrotOS Theme for Hyprlock
# Dark theme with black background and ParrotOS green accents

general {
    colors_are_srgb = false
    grace = 0
    disable_loading_bar = false
}

background {
    monitor = 
    path = screenshot
    blur_passes = 0
    blur_size = 7
    noise = 0.0119
    color = rgba(0, 0, 0, 1.0)
}

# Main password input
input-field {
    monitor = 
    size = 300, 60
    outline_thickness = 2
    outline_color = rgb(0, 255, 65)
    inner_color = rgb(0, 0, 0)
    font_color = rgb(0, 255, 65)
    font_size = 16
    font_family = monospace
    placeholder_text = <i>󰌾 Unlock...</i>
    placeholder_font_color = rgb(136, 136, 136)
    hide_input = false
    rounding = 4
    check_color = rgb(0, 204, 0)
    fail_color = rgb(255, 0, 0)
    fail_text = <i>$ATTEMPTS</i>
    fail_transition = 300
    capslock_color = rgb(255, 255, 0)
    numlock_color = rgb(0, 255, 65)
    bothlock_color = rgb(255, 0, 255)
    invert_numlock = false
    swap_font_color = false
    shadow_passes = 1
    shadow_size = 10
    shadow_color = rgba(0, 0, 0, 1.0)
    shadow_boost = 1.2
    position = 0, -20
    halign = center
    valign = center
}

# Time label
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgb(0, 255, 65)
    font_size = 48
    font_family = monospace
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.2
}

# Date label
label {
    monitor = 
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgb(102, 255, 102)
    font_size = 16
    font_family = monospace
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.0
}

# Uptime label
label {
    monitor = 
    text = cmd[update:30000] echo "Uptime: $(uptime -p | cut -d' ' -f2-)"
    color = rgb(136, 136, 136)
    font_size = 12
    font_family = monospace
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgba(0, 0, 0, 0.8)
    shadow_boost = 1.0
}
