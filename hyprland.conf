# ParrotOS Theme for Hyprland
# Dark theme with black background and ParrotOS green accents

# This is a minimal configuration for demonstration
# Extend with your own keybinds and settings

monitor=,preferred,auto,auto

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(0ff41ff)
    col.inactive_border = rgba(33333355)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = false
    }
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1a99)
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

gestures {
    workspace_swipe = off
}

device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Color overrides for ParrotOS theme
$accent = 0xff00ff41
$accentAlt = 0xff00cc00
$fg = 0xff00ff41
$bg = 0xff000000

general {
    col.active_border = $accent $accentAlt 45deg
    col.inactive_border = 0xff333333
}

decoration {
    col.shadow = 0xff000000
    col.shadow_inactive = 0x80000000
}

windowrule=float,file_progress
windowrule=float,confirm
windowrule=float,dialog
windowrule=float,download
windowrule=float,notification
windowrule=float,splash
windowrule=float,error
windowrule=float,menu
windowrule=float,toolbar

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
