# ParrotOS Theme for Tmux
# Dark theme with black background and ParrotOS green accents

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#T"
set -g history-limit 10000

# Colors - ParrotOS theme
set -g status-style bg="#1a1a1a",fg="#00ff41"
set -g status-left-style bg="#000000",fg="#00ff41"
set -g status-right-style bg="#000000",fg="#00ff41"
set -g window-status-style bg="#000000",fg="#888888"
set -g window-status-current-style bg="#00cc0040",fg="#00ff41",bold
set -g window-status-separator ""
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style fg="#333333"
set -g pane-active-border-style fg="#00ff41"
set -g message-style bg="#1a1a1a",fg="#00ff41"
set -g message-command-style bg="#1a1a1a",fg="#00ff41"

# Status bar
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 50

# Status bar left
set -g status-left "#[bg=#000000,fg=#00ff41] #S #[bg=#1a1a1a,fg=#333333]"

# Status bar right
set -g status-right "#[bg=#1a1a1a,fg=#333333]#[bg=#000000,fg=#00ff41] %H:%M:%S #[bg=#1a1a1a,fg=#333333]#[bg=#000000,fg=#00ff41] %Y-%m-%d "

# Copy mode
setw -g mode-style bg="#00cc0040",fg="#00ff41"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r < previous-window
bind -r > next-window

# Splits
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Display pane numbers
bind . display-panes

# Switch panes with mouse
bind -n MouseDown1Pane select-pane -t =

# Drag to resize panes
bind -n MouseDrag1Border resize-pane -M
