# ParrotOS Theme for Mako
# Notification daemon for Wayland with ParrotOS green accents

# Default notifications
[default]
width=400
height=100
margin=10
padding=15
border-size=2
border-color=#00ff41
border-radius=4
background-color=#000000
text-color=#00ff41
font=monospace 12
icons-path=/usr/share/icons/hicolor
icon-size=32
markup=1
format=<b>%s</b>\n%b
actions=1
default-timeout=5000
ignore-timeout=0
max-visible=5
anchor=top-right
outer-margin=10
progress-color=#00cc0040

# Critical notifications
[critical]
border-color=#ff0000
background-color=#ff000020
text-color=#ff0000
timeout=0

# Warning notifications
[warning]
border-color=#ffff00
background-color=#ffff0020
text-color=#ffff00

# Info notifications
[info]
border-color=#0066ff
background-color=#0066ff20
text-color=#00ffff

# Success notifications
[success]
border-color=#00ff41
background-color=#00cc0020
text-color=#00ff41

# Custom app-specific rules

# Firefox notifications
[app-name=firefox]
border-color=#ff8800
background-color=#ff880020

# Discord/Chat notifications
[app-name=Discord]
border-color=#00ffff
background-color=#00ffff20

# System notifications
[app-name=systemd]
border-color=#66ff66
background-color=#00cc0020
