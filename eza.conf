# ParrotOS Theme for Eza (modern ls replacement)
# Configuration file for eza with ParrotOS theme colors

# This is typically sourced as aliases in shell config
# Add these to your ~/.bashrc, ~/.zshrc, or ~/.config/eza/config

# Color definitions for ParrotOS theme
# Eza uses these environment variables to define colors

# File type colors
export EZA_COLORS="su=38;5;1:gu=38;5;208:uu=38;5;82:ur=38;5;82:uw=38;5;82:ux=38;5;82:ue=38;5;82:gr=38;5;82:gw=38;5;82:gx=38;5;82:tr=38;5;82:tw=38;5;82:tx=38;5;82:xx=38;5;82:fi=38;5;82:di=38;5;33:ln=38;5;51:or=38;5;1:ex=38;5;82:*.tar=38;5;208:*.gz=38;5;208:*.zip=38;5;208:*.7z=38;5;208:*.bz2=38;5;208:*.xz=38;5;208"

# Alternative approach - use shell aliases with standard eza command
# Add these aliases to your shell configuration file (~/.bashrc, ~/.zshrc, etc.)

# Default eza command with ParrotOS theme
# alias ls='eza --color=auto --icons --group-directories-first'
# alias la='eza -la --color=auto --icons --group-directories-first'
# alias ll='eza -l --color=auto --icons --group-directories-first'
# alias lt='eza --tree --color=auto --icons --level=3'

# Color scheme explanation:
# Directories (di): Blue #0066ff (33 = 38;5;33)
# Symlinks (ln): Cyan #00ffff (51 = 38;5;51)
# Executables (ex): Green #00ff41 (82 = 38;5;82)
# Archives (*.tar, *.gz, etc.): Orange #ff8800 (208 = 38;5;208)
# Broken links (or): Red #ff0000 (1 = 38;5;1)

# For 24-bit true color support, you can use:
# export EZA_COLORS_256="su=38;2;255;0;0:gu=38;2;255;136;0:uu=38;2;0;255;65:..."
